<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Delta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/404.css">
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">
    <div class="glitch-wrap">
      <div class="four-oh-four" aria-label="404">
        <span class="digit" data-char="4">4</span>
        <span class="digit zero" data-char="0">0</span>
        <span class="digit" data-char="4">4</span>
      </div>
    </div>

    <div class="content">
      <div class="badge">
        <span class="badge-dot"></span>
        Page not found
      </div>
      <h1>Lost in the void</h1>
      <p>The page you're looking for has drifted off into the abyss. It might have been moved, deleted, or never existed in the first place.</p>

      <div class="actions">
        <a href="index.html" class="btn btn-primary">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M6.906.664a1.749 1.749 0 0 1 2.187 0l5.25 4.2c.415.332.657.835.657 1.367v7.019A1.75 1.75 0 0 1 13.25 15h-3.5a.75.75 0 0 1-.75-.75V9H7v5.25a.75.75 0 0 1-.75.75h-3.5A1.75 1.75 0 0 1 1 13.25V6.23c0-.531.242-1.034.657-1.366l5.25-4.2Z"/></svg>
          Go home
        </a>
        <a href="javascript:history.back()" class="btn btn-secondary">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M7.78 12.53a.75.75 0 0 1-1.06 0L2.47 8.28a.75.75 0 0 1 0-1.06l4.25-4.25a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042L4.81 7h7.44a.75.75 0 0 1 0 1.5H4.81l2.97 2.97a.75.75 0 0 1 0 1.06Z"/></svg>
          Go back
        </a>
      </div>

      <div class="links">
        <span class="links-label">Or try:</span>
        <a href="index.html#explore">Explore files</a>
        <span class="sep">·</span>
        <a href="index.html#upload">Upload</a>
        <span class="sep">·</span>
        <a href="https://github.com/Rennivik" target="_blank">GitHub</a>
      </div>
    </div>

    <div class="footer-mono">
      <span>ERR_404</span>
      <span class="sep">·</span>
      <span>© Rennivik 2026</span>
      <span class="sep">·</span>
      <span id="ts"></span>
    </div>
  </div>

  <script>
    // Timestamp
    document.getElementById('ts').textContent = new Date().toISOString().split('T')[0];

    // Theme persistence
    const saved = localStorage.getItem('delta_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    // Glitch digits on hover
    const digits = document.querySelectorAll('.digit');
    const chars = '0123456789ΔΩΨΞ!?#@%';
    digits.forEach(digit => {
      const orig = digit.dataset.char;
      digit.addEventListener('mouseenter', () => {
        let count = 0;
        const interval = setInterval(() => {
          digit.textContent = chars[Math.floor(Math.random() * chars.length)];
          count++;
          if (count > 8) { clearInterval(interval); digit.textContent = orig; }
        }, 50);
      });
    });
  </script>
</body>
</html>
