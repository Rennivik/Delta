<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Page Not Found</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #1b1f2a, #0d0f14);
      color: #fff;
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    /* ⭐ STARFIELD */
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      opacity: 0.6;
      animation: twinkle linear infinite;
    }

    @keyframes twinkle {
      0% { transform: translateY(0); opacity: 0.2; }
      50% { opacity: 1; }
      100% { transform: translateY(100vh); opacity: 0.2; }
    }

    .container {
      max-width: 600px;
      padding: 20px;
      z-index: 2;
    }

    h1 {
      font-size: 120px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #ff4d4d;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 28px;
      margin-bottom: 15px;
    }

    p {
      font-size: 16px;
      opacity: 0.7;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    a {
      display: inline-block;
      padding: 12px 24px;
      background: #58a6ff;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.2s ease;
      font-weight: bold;
    }

    a:hover {
      background: #3c6ea8;
      transform: translateY(-2px);
    }

    .ghost-wrap {
      animation: float 2s ease-in-out infinite;
      display: inline-block;
    }

    .ghost {
      font-size: 60px;
      transition: transform 0.3s ease;
      display: inline-block;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
</head>

<script>
  window.addEventListener("DOMContentLoaded", () => {
    const ghost = document.querySelector(".ghost");

    function randomRotate() {
      const angle = Math.floor(Math.random() * 360);
      ghost.style.transform = `rotate(${angle}deg)`;
    }

    randomRotate();
    setInterval(randomRotate, 900);
  });
</script>

<body>
  <script>
    for (let i = 0; i < 80; i++) {
      const star = document.createElement("div");
      star.className = "star";

      star.style.left = Math.random() * 100 + "vw";
      star.style.top = Math.random() * 100 + "vh";

      const size = Math.random() * 2 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      star.style.animationDuration = (3 + Math.random() * 5) + "s";
      star.style.opacity = Math.random();

      document.body.appendChild(star);
    }
  </script>

  <div class="container">
    <div class="ghost-wrap">
      <div class="ghost">👻</div>
    </div>

    <h1>! 404 !</h1>
    <h2>Page Not Found</h2>

    <p>
      The page you're looking for doesn't exist or has been moved.<br/>
      Double-check the URL or go back home.
    </p>

    <a href="https://rennivik.github.io/Delta">Go Home</a>
  </div>
</body>
</html>
